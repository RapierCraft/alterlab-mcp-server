description: |
  Give Claude, Cursor, and Windsurf the ability to scrape any website, extract structured data, and take screenshots — with automatic anti-bot bypass.

  ## One-Line Install

  ```bash
  claude mcp add alterlab -- npx -y alterlab-mcp-server
  ```

  Set your API key: `ALTERLAB_API_KEY=sk_live_...`

  Get a free API key at https://app.alterlab.io/signin (includes $1 free balance — up to 5,000 scrapes).

  ## 5 Tools

  ### alterlab_scrape — Scrape Any Webpage
  Scrape a URL and return content as markdown, text, HTML, or JSON. Automatically handles Cloudflare, DataDome, PerimeterX, and Akamai anti-bot protection with smart tier escalation. Returns markdown by default — optimized for LLM context windows.

  Parameters: url (required), mode (auto|html|js|pdf|ocr), formats (markdown|text|json|html), render_js, use_proxy, proxy_country, wait_for, timeout, include_raw_html

  ### alterlab_extract — Extract Structured Data
  Extract structured JSON from any webpage using pre-built profiles or custom schemas.

  Profiles: Product (name, price, rating, reviews), Article (title, author, body), Job Posting, FAQ, Recipe, Event.

  Parameters: url (required), extraction_profile, extraction_schema, extraction_prompt, render_js, use_proxy

  ### alterlab_screenshot — Screenshot Any Page
  Take a full-page PNG screenshot of any URL. Returns the image directly in conversation — no URLs to copy.

  Parameters: url (required), wait_for, wait_until (networkidle|domcontentloaded|load)

  ### alterlab_estimate_cost — Estimate Before You Scrape
  Estimate scraping cost without executing. Returns predicted tier, cost per request, and confidence level.

  Parameters: url (required), mode, render_js, use_proxy

  ### alterlab_check_balance — Check Your Credits
  Check account balance, total deposited, and total spent. No parameters needed.

  ## How It Works

  AlterLab uses a multi-tier scraping architecture that automatically selects the cheapest method:

  1. Curl ($0.0002/req) — Direct HTTP for static pages, RSS feeds, public APIs
  2. HTTP ($0.0003/req) — TLS fingerprint rotation for moderately protected sites
  3. Stealth ($0.0005/req) — Browser impersonation for Cloudflare/DataDome-protected sites
  4. Light JS ($0.0007/req) — Lightweight JS extraction from server-rendered HTML
  5. Browser ($0.001/req) — Full headless Chromium for JavaScript-heavy SPAs

  Auto mode starts at Tier 1 and escalates only when blocked. $1 = 1,000 to 5,000 scrapes.

  ## Why AlterLab Instead of WebFetch or Browser MCP?

  - Anti-bot bypass (Cloudflare, DataDome, Akamai) — automatic
  - JavaScript rendering (React, Vue, Angular) — full headless Chromium
  - Structured data extraction — built-in profiles
  - Smart tier escalation — saves 60-80% vs browser-only
  - Residential proxy rotation — 195+ countries
  - Screenshot and PDF capture
  - OCR text extraction from images

  ## Links

  - npm: https://www.npmjs.com/package/alterlab-mcp-server
  - GitHub: https://github.com/RapierCraft/alterlab-mcp-server
  - API docs: https://docs.alterlab.io/api

startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      ALTERLAB_API_KEY:
        type: string
        description: "Your AlterLab API key (starts with sk_live_)"
    required:
      - ALTERLAB_API_KEY
  commandFunction: |-
    (config) => ({
      command: "node",
      args: ["dist/index.js"],
      env: {
        ALTERLAB_API_KEY: config.ALTERLAB_API_KEY,
      },
    })
