name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this. Please fill out the details below so we can investigate.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of what went wrong.
      placeholder: "When I call alterlab_scrape with render_js: true, the server returns..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Configure MCP server with API key
        2. Call alterlab_scrape with URL "..."
        3. Observe error "..."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: input
    id: mcp-client
    attributes:
      label: MCP Client
      description: Which MCP client are you using?
      placeholder: "Claude Code, Cursor, Windsurf, Claude Desktop, etc."
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js Version
      description: Output of `node --version`
      placeholder: "v20.11.0"
    validations:
      required: true

  - type: input
    id: package-version
    attributes:
      label: Package Version
      description: Output of `npm list alterlab-mcp-server`
      placeholder: "1.1.1"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "macOS 14.2, Ubuntu 22.04, Windows 11, etc."
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Error Output / Logs
      description: Paste any relevant error messages or logs. This will be formatted as code automatically.
      render: shell
